<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Kotak Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   THEME VARIABLES
══════════════════════════════════════ */
:root {
  --accent: #e8c96b;
  --accent2: #f0a05a;
  --radius: 16px;
  --radius-sm: 10px;
  --trans: 0.3s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg: #10101a;
  --bg2: #181828;
  --bg3: #20203a;
  --surface: #1e1e34;
  --surface2: #28284a;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f8;
  --text2: #9090b8;
  --text3: #5a5a80;
  --nav-bg: rgba(16,16,26,0.85);
}
[data-theme="light"] {
  --bg: #f2f0ec;
  --bg2: #ffffff;
  --bg3: #e8e4de;
  --surface: #ffffff;
  --surface2: #f5f3f0;
  --border: rgba(0,0,0,0.08);
  --text: #18181e;
  --text2: #60607a;
  --text3: #a0a0b8;
  --nav-bg: rgba(242,240,236,0.85);
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--trans), color var(--trans);
  overflow-x: hidden;
}
button { font-family: inherit; }

/* ══════════════════════════════════════
   SPLASH / INTRO ANIMATION
══════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #10101a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
  transition: opacity 0.6s ease, visibility 0.6s;
}
#splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.splash-logo {
  display: flex; align-items: center; gap: 14px;
  animation: splashIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes splashIn {
  from { opacity: 0; transform: scale(0.7) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.splash-logo svg { width: 64px; height: 64px; }

.splash-wordmark {
  display: flex; flex-direction: column; line-height: 1;
}
.splash-kotak {
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  font-weight: 900;
  color: #fff;
  letter-spacing: -0.02em;
}
.splash-studio {
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-weight: 500;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 4px;
  margin-top: 4px;
}

.splash-bar {
  width: 240px; height: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
  animation: splashIn 0.7s 0.2s both;
}
.splash-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  animation: loadBar 1.4s 0.3s cubic-bezier(.4,0,.2,1) forwards;
  width: 0;
}
@keyframes loadBar { to { width: 100%; } }

.splash-tag {
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  letter-spacing: 0.08em;
  animation: splashIn 0.7s 0.4s both;
}

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  height: 64px;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: background var(--trans);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; text-decoration: none;
}
.nav-logo svg { width: 32px; height: 32px; }
.nav-wordmark { display: flex; flex-direction: column; line-height: 1; }
.nav-kotak {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 900;
  color: var(--text);
  letter-spacing: -0.01em;
}
.nav-studio {
  font-size: 9px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--accent);
  font-weight: 600;
}
.nav-right { display: flex; align-items: center; gap: 10px; }

/* Theme toggle */
.theme-toggle {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.theme-toggle:hover { background: var(--surface2); color: var(--text); }

.btn-nav-start {
  padding: 9px 22px;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #18181e;
  font-size: 13px; font-weight: 700;
  border: none; cursor: pointer;
  letter-spacing: 0.02em;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-flex; align-items: center;
}
.btn-nav-start:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,201,107,0.35); }

/* ══════════════════════════════════════
   LANDING PAGE
══════════════════════════════════════ */
#page-home {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 64px 24px 48px;
  position: relative;
  overflow: hidden;
}

.home-bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
}
.orb1 {
  width: 500px; height: 500px;
  background: rgba(232,201,107,0.07);
  top: -100px; right: -100px;
}
.orb2 {
  width: 400px; height: 400px;
  background: rgba(240,160,90,0.05);
  bottom: 0; left: -80px;
}

.home-content { position: relative; z-index: 1; }

.home-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px;
  border-radius: 50px;
  border: 1px solid rgba(232,201,107,0.3);
  background: rgba(232,201,107,0.08);
  color: var(--accent);
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.home-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(56px, 10vw, 96px);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 8px;
}
.home-title .accent-text {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.home-divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  margin: 20px auto;
  border-radius: 2px;
}
.home-sub {
  font-size: 18px;
  color: var(--text2);
  max-width: 440px;
  margin: 0 auto 40px;
  line-height: 1.6;
  font-weight: 400;
}

.home-cta {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 18px 40px;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #18181e;
  font-size: 17px; font-weight: 700;
  border: none; cursor: pointer;
  letter-spacing: 0.02em;
  transition: all 0.25s;
  box-shadow: 0 8px 32px rgba(232,201,107,0.25);
  text-decoration: none;
}
.home-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 48px rgba(232,201,107,0.35);
}
.home-cta svg { width: 20px; height: 20px; }

.home-stats {
  display: flex; gap: 40px; justify-content: center;
  margin-top: 56px;
}
.home-stat { text-align: center; }
.home-stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 700;
  color: var(--text);
}
.home-stat-label {
  font-size: 12px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-top: 2px;
}

/* ══════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash">
  <div class="splash-logo">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="8" width="48" height="48" rx="12" fill="#e8c96b" opacity="0.15"/>
      <rect x="14" y="14" width="36" height="36" rx="8" fill="#e8c96b" opacity="0.25"/>
      <circle cx="32" cy="32" r="10" fill="#e8c96b"/>
      <circle cx="32" cy="32" r="6" fill="#18181e"/>
      <rect x="22" y="18" width="6" height="3" rx="1.5" fill="#e8c96b"/>
    </svg>
    <div class="splash-wordmark">
      <span class="splash-kotak">Kotak</span>
      <span class="splash-studio">Studio</span>
    </div>
  </div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  <div class="splash-tag">Your Aesthetic Photo Booth</div>
</div>

<!-- ══ NAV ══ -->
<nav>
  <a class="nav-logo" href="landing.html">
    <svg viewBox="0 0 32 32" fill="none">
      <rect x="3" y="3" width="26" height="26" rx="7" fill="#e8c96b" opacity="0.15"/>
      <rect x="7" y="7" width="18" height="18" rx="4" fill="#e8c96b" opacity="0.25"/>
      <circle cx="16" cy="16" r="5" fill="#e8c96b"/>
      <circle cx="16" cy="16" r="3" fill="#18181e"/>
      <rect x="11" y="8.5" width="4" height="2" rx="1" fill="#e8c96b"/>
    </svg>
    <div class="nav-wordmark">
      <span class="nav-kotak">Kotak</span>
      <span class="nav-studio">Studio</span>
    </div>
  </a>

  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()" title="Ganti tema" id="themeBtn">🌙</button>
    <a class="btn-nav-start" href="photosession (2).html">
      📸 Mulai Foto
    </a>
  </div>
</nav>

<!-- ══ HOME PAGE ══ -->
<div id="page-home">
  <div class="home-bg-orb orb1"></div>
  <div class="home-bg-orb orb2"></div>
  <div class="home-content">
    <div class="home-badge">
      <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>
      Photo Booth Digital
    </div>
    <div class="home-title">
      <span class="accent-text">Kotak</span><br>Studio
    </div>
    <div class="home-divider"></div>
    <p class="home-sub">Ambil foto, pilih frame, dan abadikan momen terbaik kamu dalam satu strip.</p>
    <a class="home-cta" href="photosession (2).html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Camera !
    </a>
    <div class="home-stats">
      <div class="home-stat"><div class="home-stat-num">3+</div><div class="home-stat-label">Frames</div></div>
      <div class="home-stat"><div class="home-stat-num">∞</div><div class="home-stat-label">Memories</div></div>
      <div class="home-stat"><div class="home-stat-num">HD</div><div class="home-stat-label">Quality</div></div>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════
   SPLASH
════════════════════════════════ */
setTimeout(() => {
  document.getElementById('splash').classList.add('hidden');
}, 2000);

/* ════════════════════════════════
   THEME
════════════════════════════════ */
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}
</script>
</body>
</html>
